<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f0f2f5;
}

/* 主框架 */
.container{
    max-width:1000px;
    margin:40px auto;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 左側 */
.sidebar{
    width:30%;
    background:#6d5d53;
    color:white;
    padding:30px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

.sidebar h3{
    margin-top:20px;
    border-bottom:1px solid #ccc;
}

/* 技能條 */
.skill-bar{
    background:#999;
    border-radius:20px;
    overflow:hidden;
    margin:8px 0;
}

.skill-level{
    height:10px;
    background:white;
    width:0;
}

/* 右側 */
.content{
    width:70%;
    background:white;
    padding:30px;
}

.name{
    font-size:32px;
    font-weight:bold;
    color:#6d5d53;
}

/* RWD */
@media (max-width:768px){
    .container{
        flex-direction:column;
        margin:0;
    }
    .sidebar,.content{
        width:100%;
    }
}
</style>
</head>

<body>

<!--音樂來源suno,ai-->
<!-- 🎵 背景音樂 -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- 左側 -->
<div class="sidebar">

    <img src="photo.jpg">

    <h2>你的姓名</h2>
    <p>亞洲大學學生</p>

    <h3>聯絡資訊</h3>
    <p>📞 0912345678</p>
    <p>📧 your@email.com</p>

    <h3>技能</h3>

    <p>HTML</p>
    <div class="skill-bar"><div class="skill-level" id="html"></div></div>

    <p>CSS</p>
    <div class="skill-bar"><div class="skill-level" id="css"></div></div>

    <p>JavaScript</p>
    <div class="skill-bar"><div class="skill-level" id="js"></div></div>

</div>

<!-- 右側 -->
<div class="content">

    <div class="name">你的姓名</div>
    <p>亞洲大學學生 ｜ 學號 114054015</p>

    <h2>個人簡介</h2>
    <p>對設計與創意領域充滿熱情，具備良好團隊合作能力。</p>

    <h2>學歷</h2>
    <p>亞洲大學 ｜ 就讀中</p>

    <h2>專案經驗</h2>
    <ul>
        <li>校內設計專題製作</li>
        <li>品牌企劃與視覺設計專案</li>
    </ul>

</div>

</div>

<script>
// 技能條動畫
window.onload = function(){
    document.getElementById("html").style.width = "85%";
    document.getElementById("css").style.width = "80%";
    document.getElementById("js").style.width = "70%";
}

// 🎵 嘗試自動播放（可能被擋）
const audio = document.getElementById("bgm");

audio.play().catch(()=>{});

// 使用者任何動作 → 開聲音
["click","mousemove","scroll","keydown","touchstart"].forEach(event=>{
    document.addEventListener(event, ()=>{
        audio.play();
    }, {once:true});
});
</script>

</body>
</html>
