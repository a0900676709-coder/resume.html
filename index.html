<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f0f2f5;
}

/* 外框 */
.container{
    max-width:1000px;
    margin:40px auto;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 左側 */
.sidebar{
    width:30%;
    background:#6d5d53;
    color:white;
    padding:30px 20px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

.sidebar .block{
    margin-top:25px;
    text-align:left;
}

.sidebar h3{
    border-bottom:1px solid #ccc;
    padding-bottom:5px;
}

/* 右側 */
.content{
    width:70%;
    background:white;
    padding:30px;
}

.name{
    font-size:32px;
    font-weight:bold;
    color:#6d5d53;
}

/* RWD */
@media (max-width:768px){
    .container{flex-direction:column;}
    .sidebar,.content{width:100%;}
}
</style>
</head>

<body>

<!-- 🎵 音樂（自動播放） -->
<audio autoplay loop muted id="bgm">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="sidebar">
    <img src="photo.jpg">
    <h2>你的姓名</h2>

    <div class="block">
        <h3>聯絡資訊</h3>
        <p>📞 0912345678</p>
        <p>📧 your@email.com</p>
    </div>
</div>

<div class="content">
    <div class="name">你的姓名</div>

    <h2>個人簡介</h2>
    <p>亞洲大學學生，對設計與創意領域充滿熱情。</p>
</div>

</div>

<script>
// 一進來先嘗試播放（可能被擋）
const audio = document.getElementById("bgm");
audio.play().catch(() => {
    audio.muted = true;
    audio.play();
});

// 🔥 使用者任何操作 → 立即開聲音
document.addEventListener("mousemove", unlock, {once:true});
document.addEventListener("click", unlock, {once:true});
document.addEventListener("scroll", unlock, {once:true});

function unlock(){
    audio.muted = false;
    audio.play();
}
</script>

</body>
</html>
