<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f0f2f5;
}

/* 主框架 */
.container{
    max-width:1000px;
    margin:40px auto;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 左側 */
.sidebar{
    width:30%;
    background:#6d5d53;
    color:white;
    padding:30px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

.sidebar h2{
    margin:10px 0;
}

/* 右側 */
.content{
    width:70%;
    background:white;
    padding:30px;
}

.name{
    font-size:32px;
    font-weight:bold;
    color:#6d5d53;
}

/* RWD */
@media (max-width:768px){
    .container{
        flex-direction:column;
        margin:0;
    }
    .sidebar,.content{
        width:100%;
    }
}
</style>
</head>

<body>

<!-- 🎵 背景音樂（無控制按鈕） -->
<audio autoplay loop muted id="bgm">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- 左側 -->
<div class="sidebar">
    <img src="photo.jpg">
    <h2>你的姓名</h2>
    <p>亞洲大學學生</p>

    <h3>聯絡資訊</h3>
    <p>📞 0912345678</p>
    <p>📧 your@email.com</p>
</div>

<!-- 右側 -->
<div class="content">

    <div class="name">你的姓名</div>

    <h2>個人簡介</h2>
    <p>
        我是亞洲大學學生，對設計與創意領域充滿熱情，
        具備良好的視覺設計與團隊合作能力。
    </p>

    <h2>學歷</h2>
    <p>亞洲大學 ｜ 就讀中</p>

    <h2>專案經驗</h2>
    <ul>
        <li>校內設計專題製作</li>
        <li>品牌企劃與視覺設計專案</li>
        <li>永續時尚提案發表</li>
    </ul>

</div>

</div>

<script>
// 🔥 嘗試開聲音（部分瀏覽器會成功）
const audio = document.getElementById("bgm");

audio.play().catch(() => {
    audio.muted = true;
    audio.play();
});

// 使用者一有動作 → 立刻有聲音
document.addEventListener("click", function(){
    audio.muted = false;
    audio.play();
}, { once: true });
</script>

</body>
</html>
