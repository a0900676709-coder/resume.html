<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f0f2f5;
}

/* 進入畫面 */
#enterScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    cursor:pointer;
    z-index:9999;
}

/* 履歷 */
.container{
    max-width:1000px;
    margin:40px auto;
    display:flex;
}

.sidebar{
    width:30%;
    background:#6d5d53;
    color:white;
    padding:20px;
    text-align:center;
}

.content{
    width:70%;
    background:white;
    padding:20px;
}

/* RWD */
@media(max-width:768px){
    .container{flex-direction:column;}
    .sidebar,.content{width:100%;}
}
</style>
</head>

<body>

<div id="enterScreen">👉 點擊進入（會播放音樂）</div>

<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="sidebar">
    <img src="photo.jpg" style="width:120px;border-radius:50%;">
    <h2>你的姓名</h2>
</div>

<div class="content">
    <h1>個人履歷</h1>
    <p>亞洲大學學生...</p>
</div>

</div>

<script>
const enter = document.getElementById("enterScreen");
const audio = document.getElementById("bgm");

enter.addEventListener("click", function(){
    audio.currentTime = 0; // 從頭開始
    audio.volume = 1;      // 確保有聲音
    audio.muted = false;
    
    audio.play().then(()=>{
        console.log("播放成功");
    }).catch((err)=>{
        console.log("播放失敗", err);
    });

    enter.style.display = "none";
});
</script>

</body>
</html>
