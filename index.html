<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:#f0f2f5;
}

/* 🔥 進入畫面 */
#enterScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    cursor:pointer;
    z-index:9999;
}

/* 主框架 */
.container{
    max-width:1000px;
    margin:40px auto;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 左側 */
.sidebar{
    width:30%;
    background:#6d5d53;
    color:white;
    padding:30px 20px;
    text-align:center;
}

.sidebar img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

/* 右側 */
.content{
    width:70%;
    background:white;
    padding:30px;
}

.name{
    font-size:32px;
    font-weight:bold;
    color:#6d5d53;
}

/* RWD */
@media (max-width:768px){
    .container{flex-direction:column;}
    .sidebar,.content{width:100%;}
}
</style>
</head>

<body>

<!-- 🔥 點擊進入（無按鈕，但整頁可點） -->
<div id="enterScreen">點擊進入履歷 🎵</div>

<!-- 🎵 背景音樂（沒有 controls = 沒播放鍵） -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="sidebar">
    <img src="photo.jpg">
    <h2>你的姓名</h2>
    <p>亞洲大學學生</p>
</div>

<div class="content">
    <div class="name">你的姓名</div>

    <h2>個人簡介</h2>
    <p>我是亞洲大學學生，對設計與創意領域充滿熱情。</p>

    <h2>學歷</h2>
    <p>亞洲大學 ｜ 就讀中</p>

    <h2>專案經驗</h2>
    <ul>
        <li>校內設計專題製作</li>
        <li>品牌企劃與視覺設計專案</li>
    </ul>

</div>

</div>

<script>
const enter = document.getElementById("enterScreen");
const audio = document.getElementById("bgm");

enter.addEventListener("click", function(){
    audio.currentTime = 0;
    audio.muted = false;
    audio.volume = 1;
    audio.play
